name: Sync SEO Data

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync_seo:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure full history for the Snapshots engine

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync SEO Metadata & Sitemap
        run: node assets/meta/seo_sync.js

      - name: Sync Website History Snapshot
        run: node assets/meta/history_sync.js

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
            commit_message: "chore: auto-sync SEO"
            file_pattern: "index.html sitemap.xml robots.txt assets/data/history.json assets/data/history/*.json"
            push_options: '--force'
            branch: main
            skip_fetch: true
