name: Sync SEO Data

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync_seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to allow for cleaner rebasing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync SEO Metadata & Sitemap
        run: node assets/meta/seo_sync.js

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
            commit_message: "chore: auto-sync SEO metadata and sitemap"
            file_pattern: "index.html sitemap.xml robots.txt"
            push_options: '--force' # Optional: use with caution
            branch: main
            skip_fetch: false
