<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <!-- EasyMDE — CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Light Mode Foundation ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-surface: #ffffff;
      --bg-elevated: #f8f9fa;
      --border: #dfdfdf;
      --text: #3c4043;
      --text-bright: #202124;
      --text-muted: #70757a;
      --accent: #1a73e8;
      --radius: 4px;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100%; }

    .header {
      padding: 12px 20px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 { font-size: 15px; font-weight: 500; color: var(--text-bright); }

    .editor-wrap { flex: 1; position: relative; background: #ffffff; }

    /* EasyMDE Pure White Blend */
    .EasyMDEContainer, .CodeMirror, .editor-toolbar, .editor-preview-side {
      background: #ffffff !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    .editor-toolbar { border-top: none !important; border-left: none !important; border-right: none !important; padding: 6px 12px !important; }
    .CodeMirror { border: none !important; padding: 20px 30px !important; font-size: 14px !important; }
    .editor-preview-side { border-top: none !important; border-bottom: none !important; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn { padding: 8px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); }
    .btn-secondary { background: transparent; color: var(--text-muted); border: none; margin-right: 8px; }
    .btn-primary { background: var(--accent); color: white; border: 1px solid var(--accent); }
    
    .loading-overlay { position: absolute; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 10; transition: opacity 0.3s; }
    .loading-overlay.hide { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Content Editor</h1>
      <div id="cellRef" style="font-family: var(--mono); font-size: 11px; color: var(--text-muted);">LOADING...</div>
    </div>
    <div class="editor-wrap">
      <div id="loadingOverlay" class="loading-overlay"><div style="width:24px; height:24px; border:2px solid #eee; border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;"></div></div>
      <textarea id="editor"></textarea>
    </div>
    <div class="footer">
      <div id="statusText" style="font-size:12px; color:var(--text-muted);">READY</div>
      <div>
        <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
        <button class="btn btn-primary" id="btnSave" onclick="save()">Save & Close</button>
      </div>
    </div>
  </div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script>
    let mde = null;
    google.script.run.withSuccessHandler(data => {
      document.getElementById('cellRef').textContent = (data.sheet + '!' + data.cell).toUpperCase();
      mde = new EasyMDE({
        element: document.getElementById('editor'),
        initialValue: data.value || '',
        autofocus: true, spellChecker: false, status: false,
        toolbar: ["bold", "italic", "strikethrough", "|", "heading-1", "heading-2", "|", "unordered-list", "ordered-list", "|", "link", "image", "|", "quote", "code", "|", "preview", "side-by-side"]
      });
      document.getElementById('loadingOverlay').classList.add('hide');
    }).getActiveCellValue();

    function save() {
      const btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      google.script.run.withSuccessHandler(() => google.script.host.close()).saveToActiveCell(mde.value());
    }
  </script>
</body>
</html>
