<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─── Variables ─── */
    :root {
      --white: #ffffff;
      --off-white: #f8f9fa;
      --border: #eeeeee;
      --text: #3c4043;
      --text-dark: #202124;
      --text-gray: #70757a;
      --blue: #1a73e8;
      --font: 'Inter', sans-serif;
    }

    /* ─── Core Layout ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--white);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    .app { display: flex; flex-direction: column; height: 100vh; background-color: var(--white); position: relative; }

    .header, .footer {
      padding: 14px 24px;
      background-color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1000;
    }

    .header { border-bottom: 1px solid var(--border); }
    .footer { border-top: 1px solid var(--border); }

    .header h1 { font-size: 15px; font-weight: 500; color: var(--text-dark); margin: 0; }
    #cellRef { font-family: monospace; font-size: 11px; color: var(--text-gray); }

    .editor-wrap {
      flex: 1;
      position: relative;
      background-color: var(--white);
      overflow: hidden;
    }

    /* ─── EasyMDE Customizations ─── */
    .EasyMDEContainer { height: 100%; display: flex; flex-direction: column; }
    .EasyMDEContainer .CodeMirror {
      flex: 1;
      background-color: var(--white);
      color: var(--text);
      border: none;
      padding: 24px 32px;
      font-size: 14px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      line-height: 1.7;
    }

    .EasyMDEContainer .editor-toolbar {
      background-color: var(--white);
      border-top: none;
      border-left: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 6px 14px;
    }

    .EasyMDEContainer .editor-toolbar button { color: var(--text-gray); }
    .EasyMDEContainer .editor-toolbar button:hover,
    .EasyMDEContainer .editor-toolbar button.active { background-color: var(--off-white); color: var(--text-dark); }

    .CodeMirror-cursor { border-left: 3px solid var(--blue) !important; filter: drop-shadow(0 0 2px var(--blue)); }
    .CodeMirror-selected { background-color: #e8f0fe; }
    .EasyMDEContainer .CodeMirror-activeline-background { background-color: #f8f9fa; }

    /* Preview Pinned Mode */
    .EasyMDEContainer .editor-preview {
      background-color: var(--white);
      color: var(--text);
      padding: 24px 32px;
      position: absolute !important;
      top: 0 !important;
      bottom: 0 !important;
      left: 0 !important;
      z-index: 9;
      height: 100% !important;
      border: none !important;
      width: 100% !important;
    }

    /* UI Bits */
    .btn { padding: 8px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: .1s; }
    .btn-secondary { background-color: transparent; color: var(--text-gray); }
    .btn-secondary:hover { background-color: var(--off-white); color: var(--text-dark); }
    .btn-primary { background-color: var(--blue); color: var(--white); border-color: var(--blue); margin-left: 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-overlay { position: absolute; inset: 0; background-color: var(--white); display: flex; align-items: center; justify-content: center; z-index: 1100; transition: opacity 0.3s ease; }
    .loading-overlay.hide { opacity: 0; pointer-events: none; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--off-white); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Content Editor</h1>
      <div id="cellRef">LOADING...</div>
    </header>

    <main class="editor-wrap">
      <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>
      <textarea id="editor"></textarea>
    </main>

    <footer class="footer">
      <div id="statusText" style="font-size:12px; color:var(--text-gray);">READY</div>
      <div class="footer-actions">
        <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
        <button class="btn btn-primary" id="btnSave" onclick="save()">Save & Close</button>
      </div>
    </footer>
  </div>

  <script>
    let mde = null;
    (function init() {
      google.script.run.withSuccessHandler(data => {
        document.getElementById('cellRef').textContent = (data.sheet + '!' + data.cell).toUpperCase();
        mde = new EasyMDE({
          element: document.getElementById('editor'),
          initialValue: data.value || '',
          autofocus: true, spellChecker: false, status: false, minHeight: '100%',
          styleActiveLine: true,
          toolbar: [
            "bold", "italic", "strikethrough", "|",
            "heading-1", "heading-2", "|",
            "unordered-list", "ordered-list", "|",
            "link", "image", "|",
            "quote", "code", "|",
            "preview",
            {
              name: "wiki-link",
              action: function(editor) {
                const cm = editor.codemirror;
                const selection = cm.getSelection();
                cm.replaceSelection('[[' + (selection || 'Page Title') + ']]');
              },
              className: "fa fa-bookmark",
              title: "Wiki Link [[Page]]"
            }
          ]
        });
        document.getElementById('loadingOverlay').classList.add('hide');
      }).getActiveCellValue();
    })();

    function save() {
      const btn = document.getElementById('btnSave'); btn.disabled = true; btn.textContent = 'Saving...';
      google.script.run.withSuccessHandler(() => google.script.host.close()).saveToActiveCell(mde.value());
    }
  </script>
</body>

</html>
