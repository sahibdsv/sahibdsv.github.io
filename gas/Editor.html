<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- EasyMDE — JS/CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─── Seamless Pure White Blend ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #ffffff !important; color: #3c4043 !important; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin:0; }
    .app { display: flex; flex-direction: column; height: 100vh; background: #ffffff; }

    .header { padding: 14px 24px; background: #ffffff; border-bottom: 1px solid #eeeeee; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 15px; font-weight: 500; color: #202124; margin:0; }

    .editor-wrap { flex: 1; position: relative; background: #ffffff; }

    /* EasyMDE Pure White Background Overrides */
    .EasyMDEContainer, .CodeMirror, .editor-toolbar, .editor-preview-side {
      background: #ffffff !important;
      color: #3c4043 !important;
      border-color: #eeeeee !important;
    }

    .editor-toolbar { border-top: none !important; border-left: none !important; border-right: none !important; padding: 6px 14px !important; }
    .CodeMirror { border: none !important; padding: 20px 32px !important; font-size: 14px !important; height: 100%; }
    .editor-preview-side { border-top: none !important; border-bottom: none !important; }

    /* Highlights & Cursors */
    .CodeMirror-selected { background: #e8f0fe !important; }
    .CodeMirror-cursor { border-left: 2px solid #1a73e8 !important; }

    .footer { padding: 14px 24px; border-top: 1px solid #eeeeee; background: #ffffff; display: flex; justify-content: space-between; align-items: center; }
    
    .status-text { font-size: 12px; color: #70757a; font-weight: 500; }
    
    .btn { padding: 8px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; border:none; transition: .1s; }
    .btn-secondary { background: transparent; color: #70757a; }
    .btn-secondary:hover { background: #f8f9fa; color: #202124; }
    .btn-primary { background: #1a73e8; color: white; margin-left: 8px; }
    .btn-primary:hover { background: #1967d2; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-overlay { position: absolute; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 10; transition: opacity .3s; }
    .loading-overlay.hide { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Content Editor</h1>
      <div id="cellRef" style="font-family: monospace; font-size: 11px; color: #70757a;">...</div>
    </div>
    <div class="editor-wrap">
      <div id="loadingOverlay" class="loading-overlay"><div style="width:24px; height:24px; border:2px solid #eee; border-top-color:#1a73e8; border-radius:50%; animation:spin .8s linear infinite;"></div></div>
      <textarea id="editor"></textarea>
    </div>
    <div class="footer">
      <div id="statusText">READY</div>
      <div>
        <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
        <button class="btn btn-primary" id="btnSave" onclick="save()">Save & Close</button>
      </div>
    </div>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script>
    let mde = null;
    google.script.run.withSuccessHandler(data => {
      document.getElementById('cellRef').textContent = (data.sheet + '!' + data.cell).toUpperCase();
      mde = new EasyMDE({
        element: document.getElementById('editor'),
        initialValue: data.value || '',
        autofocus: true, spellChecker: false, status: false, minHeight: '100%',
        toolbar: ["bold", "italic", "strikethrough", "|", "heading-1", "heading-2", "|", "unordered-list", "ordered-list", "|", "link", "image", "|", "quote", "code", "|", "preview", "side-by-side"]
      });
      document.getElementById('loadingOverlay').classList.add('hide');
    }).getActiveCellValue();
    function save() {
      const btn = document.getElementById('btnSave'); btn.disabled = true; btn.textContent = 'Saving...';
      google.script.run.withSuccessHandler(() => google.script.host.close()).saveToActiveCell(mde.value());
    }
  </script>
</body>
</html>
