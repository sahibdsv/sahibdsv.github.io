<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sahib Virdee</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f1;
      color: #151515;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #050505;
        color: #f2f2ee;
      }
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      width: min(90vw, 42rem);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 1rem 0 0;
      font-size: 1rem;
      line-height: 1.6;
      color: color-mix(in srgb, currentColor 70%, transparent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Sahib Virdee</h1>
    <p>Clean slate.</p>
  </main>
</body>
</html>
